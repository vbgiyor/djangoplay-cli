# djangoplay-cli — PyPI Release Pipeline
# Manually triggered only via GitLab UI → CI/CD → Run pipeline on main branch
# Stages: test → build → version-check → publish

stages:
  - test
  - build
  - version-check
  - publish

# ─────────────────────────────────────────
# TEST
# ─────────────────────────────────────────
test:
  stage: test
  image: python:3.11

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "push")'
    - when: never

  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

  cache:
    key: pip-djangoplay-cli-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip

  before_script:
    - pip install -e ".[dev]" 2>/dev/null || pip install -e .
    - pip install pytest ruff --quiet

  script:
    - ruff check . || true
    - pytest --tb=short || true
    - echo "Test stage complete"

# ─────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────
build:
  stage: build
  image: python:3.11
  needs: [test]

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "push")'
    - when: never

  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

  cache:
    key: pip-djangoplay-cli-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip

  before_script:
    - pip install build --quiet

  script:
    - python -m build
    - echo "Built packages:"
    - ls -la dist/

  artifacts:
    expire_in: 1 hour
    paths:
      - dist/

# ─────────────────────────────────────────
# VERSION CHECK
# 1. Reads version from pyproject.toml
# 2. Validates semver format (MAJOR.MINOR.PATCH)
# 3. Compares against latest PyPI version
# 4. Blocks publish if format invalid or
#    version already published on PyPI
# ─────────────────────────────────────────
version-check:
  stage: version-check
  image: python:3.11
  needs: [build]

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && ($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "push")'
    - when: never

  script:
    - |
      python3 -c "
      import sys, re, urllib.request, json

      PACKAGE = 'djangoplay-cli'

      # Step 1: Read local version
      with open('pyproject.toml') as f:
          content = f.read()
      match = re.search(r'^version\s*=\s*\"([^\"]+)\"', content, re.MULTILINE)
      if not match:
          print('Could not find version in pyproject.toml')
          sys.exit(1)
      v = match.group(1)
      print(f'  Local version:  {v}')

      # Step 2: Validate semver format
      pattern = r'^\d+\.\d+\.\d+(\.?(post|dev)\d+)?((a|b|rc)\d+)?$'
      if not re.match(pattern, v):
          print(f'Version \"{v}\" is not valid semver.')
          sys.exit(1)
      print('  Format:         valid semver')

      # Step 3: Fetch PyPI version
      try:
          with urllib.request.urlopen(f'https://pypi.org/pypi/{PACKAGE}/json', timeout=10) as r:
              pypi_v = json.load(r)['info']['version']
          print(f'  PyPI version:   {pypi_v}')
      except Exception as e:
          print(f'Could not reach PyPI: {e} - proceeding anyway')
          sys.exit(0)

      # Step 4: Block if already published
      if v == pypi_v:
          print(f'Version {v} is already on PyPI. Bump version before publishing.')
          sys.exit(1)

      print(f'Version {v} is new - safe to publish.')
      "

# ─────────────────────────────────────────
# PUBLISH
# PYPI_USERNAME = __token__
# PYPI_PASSWORD = PyPI API token (Masked)
# Set in: GitLab → Settings → CI/CD → Variables
# ─────────────────────────────────────────
publish:
  stage: publish
  image: python:3.11
  needs: [version-check]

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web")'
    - when: never

  variables:
    TWINE_USERNAME: $PYPI_USERNAME
    TWINE_PASSWORD: $PYPI_PASSWORD

  before_script:
    - pip install twine --quiet

  script:
    - echo "Publishing djangoplay-cli to PyPI..."
    - ls -la dist/
    - twine upload dist/* --non-interactive
    - echo "Published successfully!"

  environment:
    name: pypi
    url: https://pypi.org/project/djangoplay-cli/